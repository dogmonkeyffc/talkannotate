services:
  app:
    image: talkannotate-app:latest
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${TALKANNOTATE_HOST_PORT:-3180}:3000'
    environment:
      PORT: 3000
      TALKANNOTATE_DATA_DIR: /app/data
      NODE_ENV: production
    volumes:
      - talkannotate-app-data:/app/data
    restart: unless-stopped

volumes:
  talkannotate-app-data:
